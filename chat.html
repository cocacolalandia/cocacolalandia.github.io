<!DOCTYPE html>
<html lang="es">

<head>
    <script src="/global-head.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=no">
    <title>Chat Oficial - Cocacolalandia 26</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+New:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0c0e1b;
            --card: #14172b;
            --accent: #00c6ff;
            --accent2: #bc13fe;
            --text: #ffffff;
            --font: 'Courier New', Courier, sans-serif;
        }

        body,
        html {
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            flex-direction: column;
            display: flex;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            flex: 1;
            border-left: 1px solid rgba(0, 198, 255, 0.1);
            border-right: 1px solid rgba(0, 198, 255, 0.1);
            background: var(--bg);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(12, 14, 27, 0.98);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px var(--accent);
        }

        header {
            padding: 15px;
            background: var(--card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent);
        }

        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #my-pfp {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
        }

        #login-btn,
        #logout-btn {
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font);
            font-size: 0.8rem;
            transition: transform 0.2s ease;
        }

        #login-btn:hover,
        #logout-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        #logout-btn {
            background: #222;
            border: 1px solid #444;
        }

        #chat-box {
            height: 70vh;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .msg {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: slideUp 0.2s ease;
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            object-fit: cover;
        }

        .msg-body {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            border-bottom-left-radius: 2px;
            position: relative;
            min-width: 120px;
        }

        .msg-user {
            font-weight: 800;
            font-size: 0.8rem;
            display: block;
            margin-bottom: 3px;
        }

        .is-owner-text {
            color: #ff3333 !important;
            text-shadow: 0 0 5px rgba(255, 51, 51, 0.5);
        }

        .badge-owner {
            background: #ff3333;
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: 5px;
            font-weight: 800;
            vertical-align: middle;
        }

        .owner-icon {
            color: #ffcc00;
            margin-left: 3px;
        }

        .admin-tools {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            flex-direction: row;
            gap: 5px;
            z-index: 100;
        }

        .msg:hover .admin-tools {
            display: flex;
        }

        .btn-admin {
            background: #222;
            color: white;
            border: 1px solid #444;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-admin:hover {
            background: #ff4444;
            border-color: white;
        }

        .input-wrap {
            padding: 20px;
            background: var(--card);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid var(--accent);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-family: var(--font);
            outline: none;
        }

        button.send-v {
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--font);
        }

        .verified-icon {
            color: var(--accent);
            font-size: 10px;
            margin-left: 4px;
        }

        .hidden {
            display: none !important;
        }

        /* ESTILOS TOAST */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast-msg {
            background: rgba(20, 23, 43, 0.95);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            border-left: 4px solid var(--accent2);
            font-family: var(--font);
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5), 0 0 10px var(--accent2);
            animation: slideUpToast 0.4s ease forwards, fadeOutToast 0.4s ease 2.6s forwards;
            min-width: 200px;
            text-align: center;
        }

        @keyframes slideUpToast {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOutToast {
            to {
                transform: translateY(-20px);
                opacity: 0;
            }
        }

        /* Botón de enviar cuando está bloqueado */
        button.send-v:disabled {
            background: #222 !important;
            color: #555 !important;
            cursor: not-allowed !important;
            /* Icono de prohibido */
            box-shadow: none !important;
            transform: none !important;
            filter: grayscale(1);
        }

        /* Variante para el Toast permanente de baneo */
        .toast-ban {
            border-left: 4px solid #ff3333 !important;
            box-shadow: 0 0 20px #ff3333 !important;
            animation: slideUpToast 0.4s ease forwards !important;
            /* Quitamos la animación de salida */
        }
    </style>
</head>

<body>

    <div id="step-age" class="overlay">
        <div class="modal">
            <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--accent2); margin-bottom: 15px;"></i>
            <h2>ACCESO +14 AÑOS</h2>
            <p>Confirma que tienes al menos 14 años para entrar al chat oficial de Cocacolalandia 26.</p>
            <button class="send-v" onclick="confirmAge()">SÍ, TENGO +14</button>
        </div>
    </div>

    <div id="step-guest-name" class="overlay hidden">
        <div class="modal">
            <h3>¿CÓMO TE LLAMAS?</h3>
            <p>Elige un apodo para chatear como invitado:</p>
            <input type="text" id="guest-input-name" placeholder="Escribe aquí..." style="width:80%; margin-bottom:10px;">
            <p id="error-name" style="color: #ff4b4b; font-size: 0.8rem;" class="hidden">Ese nombre está reservado por el DUEÑO.</p>
            <button class="send-v" onclick="saveGuestName()">ENTRAR AL CHAT</button>
        </div>
    </div>

    <div id="step-profile" class="overlay hidden">
        <div class="modal">
            <h3>PERFIL VERIFICADO</h3>
            <p>Ajusta tu nombre y foto:</p>
            <input type="text" id="custom-name" placeholder="Tu nombre..." style="width:80%; margin-bottom:10px;">
            <input type="text" id="custom-img" placeholder="URL de tu foto..." style="width:80%; margin-bottom:10px;">
            <button class="send-v" onclick="saveProfile()">GUARDAR Y ENTRAR</button>
        </div>
    </div>

    <div id="admin-confirm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100000; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div class="modal" style="border: 2px solid #ff3333; box-shadow: 0 0 20px #ff3333;">
            <h3 id="confirm-title" style="color:#ff3333;">ADVERTENCIA</h3>
            <p id="confirm-msg" style="margin-bottom:20px;"></p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="send-v" id="confirm-yes" style="background:#ff3333;">SÍ, CONFIRMAR</button>
                <button class="send-v" style="background:#444;" onclick="closeConfirm()">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="app">
        <header>
            <div class="user-info-bar">
                <img id="my-pfp" src="https://i.imgur.com/PPO7d2j.png">
                <span id="my-name">Cargando...</span>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="login-btn" onclick="startGoogle()"><i class="fab fa-google"></i> ENTRAR</button>
                <button id="logout-btn" class="hidden" onclick="closeSession()">SALIR</button>
            </div>
        </header>

        <div id="chat-box"></div>

        <div class="input-wrap">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." maxlength="150">
            <button class="send-v" onclick="trySend()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import {
            initializeApp
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc,
            query,
            orderBy,
            limit,
            onSnapshot,
            serverTimestamp,
            getDocs,
            getDoc,
            deleteDoc,
            doc,
            setDoc,
            where
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import {
            getAuth,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut,
            setPersistence,
            browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLaicFQIw-h7FLXXVi93jLQD4HggwejzI",
            authDomain: "cocacolalandia123.firebaseapp.com",
            projectId: "cocacolalandia123",
            storageBucket: "cocacolalandia123.firebasestorage.app",
            messagingSenderId: "196667615632",
            appId: "1:196667615632:web:53ec75c18ba83a91312b15"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let myIp = "0.0.0.0";
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => {
                myIp = d.ip;
                checkBanStatus();
            })
            .catch(err => {
                console.warn("ipify bloqueado por AdBlock. Usando 'oculta' como IP.");
                myIp = "oculta"; // Valor seguro que no sea 0.0.0.0
                checkBanStatus();
            });
        // --- FUNCIÓN DE BLOQUEO POR BANEO ---
        async function checkBanStatus() {
            if (myIp === "0.0.0.0") return;
            const uid = auth.currentUser ? auth.currentUser.uid : "guest";
            const ipId = myIp.replace(/\./g, '_');
            let isBanned = false;

            try {
                // Comprobar UID
                if (uid !== "guest") {
                    const banSnap = await getDoc(doc(db, "banned", uid));
                    if (banSnap.exists()) isBanned = true;
                }
                // Comprobar IP
                const ipSnap = await getDoc(doc(db, "banned", ipId));
                if (ipSnap.exists()) isBanned = true;

                if (isBanned) {
                    // 1. Bloquear el input y el botón
                    const input = document.getElementById('msg-input');
                    const btn = document.querySelector('button.send-v');

                    input.disabled = true;
                    input.placeholder = "ACCESO RESTRINGIDO";
                    btn.disabled = true;

                    // 2. Lanzar Toast Permanente (sin el setTimeout de borrado)
                    showPermanentBanToast("🚫 ESTÁS BANEADO. No puedes enviar mensajes.");
                }
            } catch (e) {
                console.error("Error verificando baneo:", e);
            }
        }

        // Función especial para el aviso de baneo que no se quita
        function showPermanentBanToast(message) {
            const container = document.getElementById('toast-container') || createToastContainer();
            // Evitar duplicados
            if (document.querySelector('.toast-ban')) return;

            const toast = document.createElement('div');
            toast.className = 'toast-msg toast-ban';
            toast.innerText = message;
            container.appendChild(toast);
            // NOTA: No hay setTimeout, por lo que se queda ahí para siempre
        }
        // --- OVERRIDE DE ALERT A TOAST ---
        window.alert = function(message) {
            const container = document.getElementById('toast-container') || createToastContainer();
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        function createToastContainer() {
            const c = document.createElement('div');
            c.id = 'toast-container';
            document.body.appendChild(c);
            return c;
        }

        // --- LÓGICA CONFIRMACIÓN ---
        let confirmAction = null;
        window.openConfirm = (title, msg, action) => {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-msg').innerText = msg;
            document.getElementById('admin-confirm').style.display = 'flex';
            confirmAction = action;
        };
        window.closeConfirm = () => {
            document.getElementById('admin-confirm').style.display = 'none';
        };
        document.getElementById('confirm-yes').onclick = () => {
            if (confirmAction) confirmAction();
            closeConfirm();
        };


        let userData = {
            name: "Invitado",
            pfp: "https://i.imgur.com/PPO7d2j.png",
            isGoogle: false,
            isAdmin: false
        };

        // --- SISTEMA DE SESIÓN Y ADMIN ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const adminSnap = await getDoc(doc(db, "admins", user.email));
                    if (adminSnap.exists()) {
                        userData.isAdmin = true;
                        console.log("✅ ¡ERES ADMIN!");
                        alert("💻 MODO DUEÑO ACTIVADO");
                    } else {
                        userData.isAdmin = false;
                    }
                } catch (e) {
                    userData.isAdmin = false;
                }

                const saved = JSON.parse(localStorage.getItem('cc_profile_v3'));
                userData.name = saved?.name || user.displayName;
                userData.pfp = saved?.pfp || user.photoURL;
                userData.isGoogle = true;

                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('logout-btn').classList.remove('hidden');
            } else {
                userData.isAdmin = false;
            }
            checkBanStatus();
            updateUI();
        });

        function updateUI() {
            document.getElementById('my-name').innerText = userData.name;
            document.getElementById('my-pfp').src = userData.pfp;
        }

        window.startGoogle = async () => {
            await setPersistence(auth, browserLocalPersistence);
            const res = await signInWithPopup(auth, provider);
            document.getElementById('custom-name').value = res.user.displayName;
            document.getElementById('custom-img').value = res.user.photoURL;
            document.getElementById('step-profile').classList.remove('hidden');
        };

        window.saveProfile = () => {
            userData.name = document.getElementById('custom-name').value.trim();
            userData.pfp = document.getElementById('custom-img').value.trim();
            localStorage.setItem('cc_profile_v3', JSON.stringify({
                name: userData.name,
                pfp: userData.pfp
            }));
            updateUI();
            document.getElementById('step-profile').classList.add('hidden');
        };

        window.closeSession = () => {
            signOut(auth);
            localStorage.removeItem('cc_profile_v3');
            location.reload();
        };

        window.trySend = () => {
            const val = document.getElementById('msg-input').value.trim();
            if (!val) return;
            if (!userData.isGoogle && userData.name === "Invitado") {
                document.getElementById('step-guest-name').classList.remove('hidden');
            } else {
                executeSend(val);
            }
        };

        window.saveGuestName = async () => {
            const n = document.getElementById('guest-input-name').value.trim();
            if (!n) return;
            const q = query(collection(db, "messages"), where("user", "==", n), where("isAdmin", "==", true), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById('error-name').classList.remove('hidden');
            } else {
                userData.name = n;
                updateUI();
                document.getElementById('step-guest-name').classList.add('hidden');
                executeSend(document.getElementById('msg-input').value);
            }
        };

        async function executeSend(text) {
            try {
                if (myIp === "0.0.0.0") {
                    const r = await fetch('https://api.ipify.org?format=json');
                    const d = await r.json();
                    myIp = d.ip;
                }

                await addDoc(collection(db, "messages"), {
                    text: text,
                    user: userData.name,
                    pfp: userData.pfp,
                    isGoogle: userData.isGoogle,
                    isAdmin: userData.isAdmin,
                    uid: auth.currentUser ? auth.currentUser.uid : "guest",
                    ip: myIp,
                    time: serverTimestamp()
                });

                document.getElementById('msg-input').value = "";
                // Si el envío es exitoso, nos aseguramos de limpiar cualquier error previo
                cleanUp();

            } catch (e) {
                console.error("Error al enviar:", e);

                // Solo muestra el Toast de baneo si el error es de falta de permisos (Firebase lo bloquea)
                if (e.code === 'permission-denied') {
                    showPermanentBanToast("🚫 Acceso denegado: Estás baneado del chat.");
                } else {
                    // Si es otro error (como falta de internet), usa un alert normal que desaparece
                    alert("⚠️ Error al enviar el mensaje. Revisa tu conexión.");
                }
            }
        }

        // --- HERRAMIENTAS ADMIN ---
        window.delMsg = (id) => {
            openConfirm("BORRAR", "¿Quieres eliminar este mensaje?", async () => {
                await deleteDoc(doc(db, "messages", id));
                alert("Mensaje eliminado");
            });
        };
        window.banUser = async (uid, ip) => {
            if (confirm("¿Seguro que quieres banear a este usuario?")) {
                // SI LA IP DEL MENSAJE ES 0.0.0.0, USA LA TUYA (myIp) QUE YA CARGÓ AL INICIO
                let targetIp = (ip === "0.0.0.0" || !ip) ? myIp : ip;

                // Baneo por UID
                if (uid && uid !== "guest") {
                    await setDoc(doc(db, "banned", uid), {
                        banned: true
                    });
                }

                // Baneo por IP (Cambiando puntos por guiones para Firebase)
                const ipId = targetIp.replace(/\./g, '_');
                await setDoc(doc(db, "banned", ipId), {
                    banned: true,
                    ip: targetIp
                });

                alert("Usuario e IP (" + targetIp + ") baneados correctamente.");
            }
        };

        // --- ESCUCHA TIEMPO REAL ---
        const qC = query(collection(db, "messages"), orderBy("time", "desc"), limit(20));
        onSnapshot(qC, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.docs.reverse().forEach(d => {
                const m = d.data();
                const isOwner = m.isAdmin === true;
                box.innerHTML += `
                    <div class="msg">
                        <img src="${m.pfp}" class="msg-img" style="${isOwner ? 'border: 2px solid #ff3333' : ''}">
                        <div class="msg-body">
                            <span class="msg-user ${isOwner ? 'is-owner-text' : ''}">
                                ${m.user} ${isOwner ? '<i class="fas fa-crown owner-icon"></i> <span class="badge-owner">DUEÑO</span>' : ''}
                                ${m.isGoogle && !isOwner ? '<i class="fas fa-check-circle verified-icon"></i>' : ''}
                            </span>
                            <span>${m.text}</span>
                        </div>
                        ${userData.isAdmin ? `
                            <div class="admin-tools">
                                <button class="btn-admin" onclick="delMsg('${d.id}')">Borrar</button>
                                <button class="btn-admin" onclick="banUser('${m.uid}', '${m.ip}')">Banear</button>
                            </div>
                        ` : ''}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        window.confirmAge = () => {
            document.getElementById('step-age').classList.add('hidden');
            localStorage.setItem('age_ok_cc', '1');
        };
        if (localStorage.getItem('age_ok_cc')) document.getElementById('step-age').classList.add('hidden');

        async function cleanUp() {
            const s = await getDocs(query(collection(db, "messages"), orderBy("time", "desc")));
            if (s.size > 50) s.docs.slice(20).forEach(async d => await deleteDoc(doc(db, "messages", d.id)));
        }

        document.getElementById('msg-input').onkeypress = (e) => {
            if (e.key === 'Enter') trySend();
        };
    </script>
</body>

</html>
