<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/global-head.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=no">
    <title>Chat Realtime - Cocacolalandia</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+New:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0e1b;
            --card: #14172b;
            --accent: #00c6ff;
            --accent2: #bc13fe;
            --text: #ffffff;
            --font: 'Courier New', Courier, sans-serif;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            background-color: var(--bg); color: var(--text);
            font-family: var(--font); overflow: hidden;
        }

        /* VERIFICACIÓN DE EDAD Y CONFIGURACIÓN DE PERFIL */
        .overlay {
            position: fixed; inset: 0; background: rgba(12, 14, 27, 0.95);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .modal {
            background: var(--card); padding: 25px; border-radius: 15px;
            border: 2px solid var(--accent); max-width: 400px; width: 100%;
            text-align: center; box-shadow: 0 0 20px var(--accent);
        }

        /* APP ESTRUCTURA */
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }

        header {
            padding: 10px 20px; background: var(--card);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--accent);
        }

        #chat-box {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* BURBUJAS DE MENSAJE */
        .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 90%; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--accent); }
        .msg-body { background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 12px; }
        .msg-user { color: var(--accent); font-weight: 800; font-size: 0.8rem; display: block; }

        /* INPUT */
        .input-wrap {
            padding: 15px; background: var(--card); display: flex; gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input[type="text"] {
            flex: 1; background: #000; border: 1px solid var(--accent);
            color: white; padding: 12px; border-radius: 8px; font-family: var(--font);
        }

        button {
            background: linear-gradient(45deg, var(--accent), var(--accent2));
            color: white; border: none; padding: 10px 15px; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-family: var(--font);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="step-age" class="overlay">
        <div class="modal">
            <h2>¿ERES MAYOR?</h2>
            <p>Para entrar al chat de Cocacolalandia debes tener al menos 14 años.</p>
            <button onclick="confirmAge()">SÍ, TENGO +14</button>
        </div>
    </div>

    <div id="step-profile" class="overlay hidden">
        <div class="modal">
            <h3>CONFIGURA TU PERFIL</h3>
            <p>Elige cómo te verán los demás:</p>
            <input type="text" id="custom-name" placeholder="Tu nombre..." style="width:80%; margin-bottom:10px;"><br>
            <input type="text" id="custom-img" placeholder="URL de tu foto (opcional)" style="width:80%; margin-bottom:10px;">
            <button onclick="saveProfile()">GUARDAR Y ENTRAR</button>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="my-pfp" src="https://i.imgur.com/PPO7d2j.png" style="width:30px; border-radius:50%">
                <span id="my-name" style="font-size:0.9rem">Invitado</span>
            </div>
            <button id="login-btn" onclick="startGoogle()"><i class="fab fa-google"></i> ENTRAR</button>
        </header>

        <div id="chat-box"></div>

        <div class="input-wrap">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." maxlength="150">
            <button onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, getDocs, deleteDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLaicFQIw-h7FLXXVi93jLQD4HggwejzI",
            authDomain: "cocacolalandia123.firebaseapp.com",
            projectId: "cocacolalandia123",
            storageBucket: "cocacolalandia123.firebasestorage.app",
            messagingSenderId: "196667615632",
            appId: "1:196667615632:web:53ec75c18ba83a91312b15"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let userData = { name: "Invitado", pfp: "https://i.imgur.com/PPO7d2j.png", isGoogle: false };

        // --- CONTROL DE FLUJO ---
        window.confirmAge = () => {
            document.getElementById('step-age').classList.add('hidden');
            localStorage.setItem('cocacola-age', 'ok');
        };
        if(localStorage.getItem('cocacola-age')) document.getElementById('step-age').classList.add('hidden');

        // --- GOOGLE AUTH ---
        window.startGoogle = async () => {
            const result = await signInWithPopup(auth, provider);
            // Al loguear, abrimos el modal de configuración de perfil
            document.getElementById('custom-name').value = result.user.displayName;
            document.getElementById('custom-img').value = result.user.photoURL;
            document.getElementById('step-profile').classList.remove('hidden');
        };

        window.saveProfile = () => {
            const n = document.getElementById('custom-name').value.trim();
            const i = document.getElementById('custom-img').value.trim();
            if(!n) return alert("Ponte un nombre");
            
            userData.name = n;
            userData.pfp = i || "https://i.imgur.com/PPO7d2j.png";
            userData.isGoogle = true;

            document.getElementById('my-name').innerText = n;
            document.getElementById('my-pfp').src = userData.pfp;
            document.getElementById('step-profile').classList.add('hidden');
            document.getElementById('login-btn').classList.add('hidden');
        };

        // --- LÓGICA DEL CHAT ---
        window.sendMsg = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            // Si es invitado, comprobar si el nombre está "pillado"
            if(!userData.isGoogle) {
                const nombreElegido = prompt("Dinos tu nombre para este mensaje:", "Invitado");
                if(!nombreElegido) return;
                
                // Comprobamos si ese nombre lo tiene alguien de Google en los mensajes
                const qUser = query(collection(db, "messages"), where("user", "==", nombreElegido), where("isGoogle", "==", true), limit(1));
                const check = await getDocs(qUser);
                
                if(!check.empty) {
                    alert("Este nombre pertenece a un usuario registrado. Elige otro o entra con Google.");
                    return;
                }
                userData.name = nombreElegido;
            }

            await addDoc(collection(db, "messages"), {
                text,
                user: userData.name,
                pfp: userData.pfp,
                isGoogle: userData.isGoogle,
                time: serverTimestamp()
            });
            input.value = "";
            cleanOldies();
        };

        // --- ESCUCHAR MENSAJES (Los 20 anteriores) ---
        const qChat = query(collection(db, "messages"), orderBy("time", "desc"), limit(20));
        onSnapshot(qChat, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.docs.reverse().forEach(d => {
                const m = d.data();
                box.innerHTML += `
                    <div class="msg">
                        <img src="${m.pfp}" class="msg-img">
                        <div class="msg-body">
                            <span class="msg-user">${m.user} ${m.isGoogle ? '<i class="fas fa-check-circle" style="font-size:10px"></i>' : ''}</span>
                            <span>${m.text}</span>
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        async function cleanOldies() {
            const snap = await getDocs(query(collection(db, "messages"), orderBy("time", "desc")));
            if(snap.size > 50) {
                snap.docs.slice(20).forEach(async (d) => await deleteDoc(doc(db, "messages", d.id)));
            }
        }

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') sendMsg(); };
    </script>
</body>
</html>
