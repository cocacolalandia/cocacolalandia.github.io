    <title>Cocacolalandia 26</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier New:wght@400;600;800&amp;display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon family=Material+Icons">
    <style>
        /* 1. VARIABLES (Control total de colores) */
        :root {
            --bg-color: #0c0e1b;
            --card-color: #14172b;
            --text-color: #fff;
            --accent: #00c6ff;
            --accent2: #bc13fe;
            --shadow: 0 0 15px rgba(0, 198, 255, 0.3);
            --font-main: 'Courier New', Courier, sans-serif;
        }

        /* Temas */
        body.light-mode {
            --bg-color: #f4f6fa;
            --card-color: #ffffff;
            --text-color: #0c0e1b;
            --shadow: 0 0 15px rgba(188, 19, 254, 0.15);
        }

        body.theme-matrix {
            --bg-color: #000000;
            --card-color: #050505;
            --text-color: #00ff41;
            --accent: #00ff41;
            --accent2: #008f11;
            --shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        /* 2. BASE */
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 3. HEADER Y BUSCADOR (COMPLETO) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background-color: rgba(10, 12, 25, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            height: 48px;
            width: auto;
            -webkit-user-drag: none;
        }

        header .search-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header input#search {
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            background-color: rgba(255, 255, 255, 0.02);
            color: var(--text-color);
            outline: none;
            font-size: 15px;
            width: 220px;
            transition: all .18s;
            font-family: var(--font-main);
        }

        header input#search:focus {
            border-color: var(--accent);
            box-shadow: 0 6px 18px rgba(0, 198, 255, 0.1);
        }

        /* 4. BANNER DE ALERTAS (MORADO) */
        #alertBanner {
            max-width: 1200px;
            margin: 20px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .banner-message {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background-color: #8a2be2;
            color: #fff;
            opacity: 0;
            transition: opacity 0.5s ease;
            display: none;
        }

        .banner-message.active {
            display: flex;
            opacity: 1;
        }

        .banner-btn {
            background-color: var(--accent2);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 12px 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
            font-family: var(--font-main);
        }

        .banner-btn:hover {
            background-color: var(--accent);
            color: #000;
            transform: translateY(-3px);
        }

        /* 5. TYPEWRITER AREA */
        .typewriter-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 26px 10%;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.06), transparent);
        }

        .typewriter {
            font-size: 1.8rem;
            font-weight: 800;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .typewriter .dynamic {
            min-width: 520px;
            overflow: hidden;
        }

        .typewriter .dynamic .cursor {
            display: inline-block;
            width: 3px;
            height: 1.1em;
            background-color: var(--accent);
            margin-left: 6px;
            animation: blink 1s steps(2, start) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* 6. BOTÓN JUEGA YA (EL GRANDE CON ICONOS) */
        .play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(90deg, #6f00ff, #9b00ff);
            color: white;
            padding: 14px 26px;
            border-radius: 14px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(155, 0, 255, 0.3);
            font-family: var(--font-main);
        }

        .play-btn:hover {
            background: linear-gradient(90deg, #9b00ff, #c200ff);
            box-shadow: 0 0 25px rgba(155, 0, 255, 0.6);
            transform: scale(1.05);
        }

        .play-btn i {
            transition: transform 0.3s ease;
        }

        .play-btn:hover i:first-child {
            transform: rotate(-20deg);
        }

        .play-btn:hover i:last-child {
            transform: translateX(5px);
        }

        /* 7. GRID DE JUEGOS Y CARDS */
        #games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 40px 10%;
        }

        .game-card {
            background-color: var(--card-color);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 25px var(--accent);
        }

        .game-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }

        .game-card h3 {
            margin: 15px;
            font-weight: 600;
            font-family: var(--font-main);
        }

        .game-card button {
            width: calc(100% - 30px);
            margin: 0 15px 15px 15px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
            font-family: var(--font-main);
        }

        .game-card button:hover {
            opacity: 0.8;
        }

        .game-card button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            pointer-events: none;
            background: var(--card-color);
            color: rgba(255, 255, 255, 0.5);
            box-shadow: none;
        }

        /* 8. FAVORITOS */
        .favorite {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            padding: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .favorite:active {
            transform: scale(.95);
        }

        .favorite.active {
            color: #ffda44;
            background-color: rgba(255, 255, 255, 0.04);
        }

        /* 9. BOTONES FLOTANTES Y REDES */
        .floating-btn {
            position: fixed;
            right: 20px;
            padding: 14px 18px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 100;
            color: white;
            font-family: var(--font-main);
        }

        .floating-btn:hover {
            transform: translateY(-3px);
        }

        .floating-btn:disabled {
            cursor: not-allowed;
            opacity: 0.4;
            pointer-events: none;
            background-color: #555;
            box-shadow: none;
            transform: none;
        }

        #scrollTopBtn {
            bottom: 110px;
            background-color: var(--accent);
            box-shadow: var(--shadow);
        }

        #whatsappBtn {
            bottom: 60px;
            background-color: #25D366;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
        }

        #panicBtn {
            bottom: 10px;
            background-color: #e63946;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.5);
        }

        /* 10. LOADER */
        #loader {
            position: fixed;
            inset: 0;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-circle {
            border: 5px solid transparent;
            border-top: 5px solid var(--accent);
            border-right: 5px solid var(--accent2);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 11. FOOTER (COMPLETO) */
        footer {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 10%;
            text-align: center;
            border-top: 2px solid var(--accent);
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.2);
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .social-icon {
            font-size: 2rem;
            color: var(--accent);
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-icon:hover {
            color: var(--accent2);
            transform: scale(1.1);
        }

        .footer-links button,
        .footer-links a {
            background: none;
            border: none;
            font-family: var(--font-main);
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            margin: 0 15px;
            transition: color 0.3s;
        }

        .footer-links button:hover,
        .footer-links a:hover {
            color: var(--accent2);
        }

        .copyright-text {
            display: none;
            margin-top: 20px;
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-color);
            opacity: 0.8;
        }

        /* 12. BOTÓN PRIVACIDAD */
        #privacidad {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            text-decoration: none;
            font-family: var(--font-main);
        }

        #privacidad:hover {
            background-color: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
            transform: translateY(-2px);
        }

        /* 13. RESPONSIVE */
        @media (max-width: 720px) {
            header {
                padding: 14px 6%;
            }

            header input#search {
                width: 140px;
            }

            .typewriter .dynamic {
                min-width: 260px;
            }

            .typewriter {
                font-size: 1.2rem;
            }

            #games {
                padding: 20px 6%;
            }

            .footer-links button,
            .footer-links a {
                display: block;
                margin: 10px auto;
            }
        }
    </style>
</head>

                }
            ];

            const gamesContainer = document.getElementById("games");
            let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

            function renderGames(filter = "") {
                gamesContainer.innerHTML = "";

                // Ordenar: favoritos primero (alfabético), luego el resto (alfabético)
                const sortedGames = [...games].sort((a, b) => {
                    const aFav = favorites.includes(a.name);
                    const bFav = favorites.includes(b.name);
                    if (aFav && !bFav) return -1;
                    if (!aFav && bFav) return 1;
                    return a.name.localeCompare(b.name);
                });

                sortedGames
                    .filter(g => g.name.toLowerCase().includes(filter.toLowerCase()))
                    .forEach(game => {
                        const card = document.createElement("div");
                        card.className = "game-card";
                        card.innerHTML = `
          <div class="favorite ${favorites.includes(game.name) ? "active" : ""}" title="Marcar favorito">★</div>
          <img src="${game.img}" alt="${game.name}" loading="lazy">
          <h3>${game.name}</h3>
          <button class="play-btn"><i class="fa-solid fa-gamepad"></i> | Jugar</button>
        `;

                        const favEl = card.querySelector(".favorite");
                        favEl.addEventListener("click", e => {
                            e.stopPropagation();
                            if (favorites.includes(game.name)) {
                                favorites = favorites.filter(x => x !== game.name);
                                favEl.classList.remove("active");
                            } else {
                                favorites.push(game.name);
                                favEl.classList.add("active");
                            }
                            localStorage.setItem("favorites", JSON.stringify(favorites));
                            renderGames(document.getElementById("search").value); // 🔁 Re-render con orden actualizado
                        });

                        card.querySelector(".play-btn").addEventListener("click", () => window.open(game.link, "_blank"));
                        gamesContainer.appendChild(card);
                    });
            }

            renderGames();
            document.getElementById("search").addEventListener("input", e => renderGames(e.target.value));

                behavior: "smooth"

                const icon = toggle.querySelector("i");
                if (document.body.classList.contains("light-mode")) {
                    icon.classList.remove("fa-moon");
                    icon.classList.add("fa-sun");
                } else {
                    icon.classList.remove("fa-sun");
                    icon.classList.add("fa-moon");

            let pIndex = 0;
            let charIndex = 0;
            let typing = true;

            function typeCycle() {
                const current = phrases[pIndex];

                if (typing) {
                    // Escribir
                    if (charIndex < current.length) {
                        dyn.textContent = current.substring(0, charIndex + 1);
                        charIndex++;
                        setTimeout(typeCycle, 45);
                    } else {
                        typing = false;
                        setTimeout(typeCycle, 1500);
                    }
                } else {
                    // Borrar
                    if (charIndex > 0) {
                        dyn.textContent = current.substring(0, charIndex - 1);
                        charIndex--;
                        setTimeout(typeCycle, 25);
                    } else {
                        // Limpiar antes de pasar a la siguiente frase (evita el bug del flash)
                        dyn.textContent = "";
                        pIndex = (pIndex + 1) % phrases.length;
                        typing = true;
                        setTimeout(typeCycle, 300);
                    }
                }
            }

            setTimeout(typeCycle, 600);

        });
    </script>

    <script>
        // JavaScript para alternar la visibilidad del texto de copyright
        const toggleBtn = document.getElementById('toggle-copyright');
        const copyrightText = document.getElementById('copyright-text');

        toggleBtn.addEventListener('click', () => {
            // Alternar entre mostrar y ocultar
            if (copyrightText.style.display === 'none' || copyrightText.style.display === '') {
                copyrightText.style.display = 'block';
                toggleBtn.innerHTML = 'Ocultar declaración de copyright';
            } else {
                copyrightText.style.display = 'none';
                toggleBtn.innerHTML = 'Mostrar declaración de copyright';
            }
        });
    </script>
