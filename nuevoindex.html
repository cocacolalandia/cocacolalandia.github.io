<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/global-head.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocacolalandia | Premium Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #ff003c;
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --font: 'Space Grotesk', sans-serif;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Reset y Tipografía Unificada */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: var(--font) !important; 
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 90px 1fr;
            height: 100vh;
        }

        /* BARRA LATERAL ESTILO NEÓN */
        nav {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            gap: 35px;
            z-index: 100;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.6rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px;
        }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(255, 0, 60, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .nav-link.active { color: var(--primary); }

        /* CONTENIDO PRINCIPAL */
        main {
            padding: 50px 60px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* BUSCADOR REDISEÑADO */
        .search-container {
            margin-bottom: 50px;
            position: relative;
            max-width: 500px;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.1);
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            outline: none;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 300;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-family: var(--font) !important;
        }

        /* GRID DE CARTAS PREMIUM */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 10px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 0, 60, 0.4);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-img-wrapper {
            width: 100%;
            height: 180px;
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-body {
            padding: 10px 15px 20px;
        }

        .card h3 { 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            margin-bottom: 8px;
            font-size: 1.3rem;
        }

        .card p { 
            font-size: 0.9rem; 
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
        }

        /* Botón Jugar Flotante */
        .play-btn {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: var(--transition);
        }

        .card:hover .play-btn {
            opacity: 1;
            transform: scale(1);
        }

        /* Scrollbar Personalizada */
        main::-webkit-scrollbar { width: 8px; }
        main::-webkit-scrollbar-track { background: transparent; }
        main::-webkit-scrollbar-thumb { 
            background: var(--border); 
            border-radius: 10px; 
        }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            nav { 
                flex-direction: row; width: 100%; height: 70px; 
                position: fixed; bottom: 0; padding: 0; justify-content: space-around;
            }
            main { padding: 30px 20px 100px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <nav>
            <div class="nav-link active" title="Inicio" onclick="location.reload()"><i class="fa-solid fa-house-chimney"></i></div>
            <!-- Nuevo icono de Juego -->
            <div class="nav-link" title="Explorar Juegos" onclick="window.location.href='/juegos'"><i class="fa-solid fa-gamepad"></i></div>
            <div class="nav-link" title="Chat" onclick="window.open('https://cocacolalandia.github.io/chat')"><i class="fa-solid fa-comments"></i></div>
            <!-- Icono Pánico Nuclear -->
            <div class="nav-link" title="Modo Pánico" onclick="window.location.href='https://classroom.google.com'"><i class="fa-solid fa-radiation"></i></div>
            <div class="nav-link" title="Personalizar" onclick="cambiarTema()"><i class="fa-solid fa-palette"></i></div>
        </nav>

        <main>
            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass" style="color: var(--primary)"></i>
                    <input type="text" id="gameSearch" placeholder="¿A qué quieres jugar hoy?">
                </div>
            </div>

            <div class="games-grid" id="grid">
                <!-- Inyección de 12 juegos -->
            </div>
        </main>
    </div>

    <script>
        const games = [
            { name: "1v1.LOL", desc: "Battle Royale Arena", img: "https://images.crazygames.com/games/1v1-lol/cover-1585728351086.png", link: "https://cocacolalandia.github.io/juegos?search=1+v+1" },
            { name: "Slope", desc: "Descenso a toda velocidad", img: "https://img.y8.com/cloud/y8-thumbs/246/thumbnail464x348.jpg", link: "https://cocacolalandia.github.io/juegos?search=slope" },
            { name: "Among Us", desc: "Sobrevive a la traición", img: "https://cdn1.epicgames.com/salesEvent/salesEvent/amoguslandscape_2560x1440-3fac17e8bb45d81ec9b2c24655758075", link: "https://cocacolalandia.github.io/juegos?search=among+us" },
            { name: "12 Minibattles", desc: "Duelos arcade clásicos", img: "https://imgs.crazygames.com/games/12-minibattles/cover_16x9-1707829553932.png", link: "https://cocacolalandia.github.io/juegos?search=minibattles" },
            { name: "Granny", desc: "No hagas ningún ruido", img: "https://play-lh.googleusercontent.com/XPM8u_fQrERAQFNp1byQgCphu6_q_WSrJutTm2PF9iQBYbOhVu3ubliUxHaoZVdhyro=w526-h296-rw", link: "https://cocacolalandia.github.io/juegos?search=granny" },
            { name: "Baldi Basics", desc: "Lecciones de terror", img: "https://play-lh.googleusercontent.com/Cl3q99D2bBmKlP_lHfA1h0sw-G0GKrpuvQZ2Mk1ZiXST8Q3AjWqOepPVKzrIFoMCtzQ=w526-h296-rw", link: "https://cocacolalandia.github.io/juegos?search=baldi" },
            { name: "Crossy Road", desc: "Llega al otro lado", img: "https://i.blogs.es/198eb8/crossy/450_1000.webp", link: "https://cocacolalandia.github.io/juegos?search=crossy" },
            { name: "Subway Surfers", desc: "Evasión en las vías", img: "https://unity.com/_next/image?url=https%3A%2F%2Fcdn.bfldr.com%2FS5BC9Y64%2Fat%2Fmchpwh4jw8ct4nr7tnjvgnxs%2FSubwaySurfers-FeaturedImage.jpg%3Fauto%3Dwebp&w=3840&q=75", link: "https://cocacolalandia.github.io/juegos?search=subwaysurfers" },
            { name: "Minecraft", desc: "Creatividad sin límites", img: "https://xboxwire.thesourcemediaassets.com/sites/4/15YR_Free_Cape-1-7cbcb0739e3df57534ec-9063efed017354d1b1c3.jpg", link: "https://cocacolalandia.github.io/juegos?search=minecraft" },
            { name: "Geometry Dash", desc: "Sincronía perfecta", img: "https://m.media-amazon.com/images/I/61CCVhzkDeL.png", link: "https://cocacolalandia.github.io/juegos?search=geometrydash" },
            { name: "Plantas vs Zombies", desc: "Estrategia botánica", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiG2JRHlL7RoyZ4ZkOeNpg1nkZRtu1CWuLww&s", link: "https://cocacolalandia.github.io/juegos?search=plantsvszombies" },
            { name: "FNAF 1", desc: "Cinco noches de vigilia", img: "https://i.imgur.com/vU9R3AN.png", link: "https://cocacolalandia.github.io/juegos?search=fnaf" }
        ];

        function render(filter = "") {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="play-btn"><i class="fa-solid fa-play"></i></div>
                    <div class="card-img-wrapper">
                        <img src="${game.img}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <h3>${game.name}</h3>
                        <p>${game.desc}</p>
                    </div>
                `;
                card.onclick = () => window.open(game.link, '_blank');
                grid.appendChild(card);
            });
        }

        document.getElementById("gameSearch").oninput = (e) => render(e.target.value);
        render();
    </script>
</body>
</html>
