<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/global-head.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cocacolalandia | Ultra Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #ff003c; /* Rojo Coca-Cola Moderno */
            --bg: #080808;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --font: 'Space Grotesk', sans-serif;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        body {
            background: var(--bg);
            color: white;
            font-family: var(--font);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- CURSOR PERSONALIZADO --- */
        #custom-cursor {
            width: 20px; height: 20px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s;
        }

        /* --- FONDO ANIMADO --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            filter: blur(80px); opacity: 0.4;
        }

        /* --- LAYOUT --- */
        .app-container {
            display: grid;
            grid-template-columns: 80px 1fr;
            height: 100vh;
        }

        /* NAV LATERAL MINIMALISTA */
        nav {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 40px;
        }

        .nav-link {
            color: #555;
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
        }

        /* CONTENIDO PRINCIPAL */
        main {
            padding: 40px 60px;
            overflow-y: auto;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        /* GRID EVOLUCIONADO */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            transition: var(--transition);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .card:hover {
            border-color: var(--primary);
            background: rgba(255, 0, 60, 0.05);
        }

        .card-img {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 20px;
            transition: var(--transition);
            transform: translateZ(20px);
        }

        .card:hover .card-img {
            transform: translateZ(50px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .card-info h3 {
            font-size: 1.4rem;
            margin-bottom: 5px;
            transform: translateZ(30px);
        }

        .card-info p {
            font-size: 0.9rem;
            opacity: 0.4;
            transform: translateZ(20px);
        }

        .play-indicator {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateX(20px);
            transition: var(--transition);
        }

        .card:hover .play-indicator {
            opacity: 1;
            transform: translateX(0);
        }

        /* BARRA DE BÚSQUEDA FLOTANTE */
        .search-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            width: fit-content;
            margin-bottom: 40px;
        }

        .search-box input {
            background: none;
            border: none;
            color: white;
            font-family: var(--font);
            font-size: 1rem;
            outline: none;
            width: 250px;
        }

        /* MODO PÁNICO (INVISIBILIDAD) */
        .panic-active {
            display: none !important;
        }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="app-container">
        <nav>
            <div class="nav-link active"><i class="fa-solid fa-house-chimney"></i></div>
            <div class="nav-link" onclick="window.open('https://cocacolalandia.github.io/chat')"><i class="fa-solid fa-ghost"></i></div>
            <div class="nav-link" onclick="window.location.href='https://classroom.google.com'"><i class="fa-solid fa-shield-halved"></i></div>
            <div class="nav-link" onclick="document.body.classList.toggle('light-mode')"><i class="fa-solid fa-moon"></i></div>
        </nav>

        <main id="main-content">
            <div class="status-bar">
                <div id="date-display">CARGANDO SISTEMA...</div>
                <div>COCACOLALANDIA OS v4.0</div>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="gameSearch" placeholder="Escribe para buscar...">
            </div>

            <div class="games-grid" id="grid">
                <!-- Se inyecta por JS -->
            </div>
        </main>
    </div>

    <script>
        // --- BASE DE DATOS MEJORADA ---
        const games = [
            { name: "1v1.LOL", desc: "Battle Royale Competitivo", img: "https://images.crazygames.com/games/1v1-lol/cover-1585728351086.png", link: "https://cocacolalandia.github.io/juegos?search=1+v+1" },
            { name: "Slope", desc: "Velocidad Infinita", img: "https://img.y8.com/cloud/y8-thumbs/246/thumbnail464x348.jpg", link: "https://cocacolalandia.github.io/juegos?search=slope" },
            { name: "Minecraft", desc: "Mundo Abierto", img: "https://xboxwire.thesourcemediaassets.com/sites/4/15YR_Free_Cape-1-7cbcb0739e3df57534ec-9063efed017354d1b1c3.jpg", link: "https://cocacolalandia.github.io/juegos?search=minecraft" },
            { name: "FNAF 1", desc: "Terror en la oficina", img: "https://i.imgur.com/vU9R3AN.png", link: "https://cocacolalandia.github.io/juegos?search=fnaf" }
        ];

        // --- LÓGICA DE RENDERIZADO ---
        function render(filter = "") {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            
            games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase())).forEach(game => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img src="${game.img}" class="card-img">
                    <div class="card-info">
                        <h3>${game.name}</h3>
                        <p>${game.desc}</p>
                    </div>
                    <div class="play-indicator"><i class="fa-solid fa-play"></i></div>
                `;
                card.onclick = () => window.open(game.link, '_blank');
                
                // Efecto Tilt (Inclinación)
                card.onmousemove = (e) => {
                    let rect = card.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    let y = e.clientY - rect.top;
                    let rotateX = (y - rect.height/2) / -10;
                    let rotateY = (x - rect.width/2) / 10;
                    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                };
                card.onmouseleave = () => card.style.transform = `rotateX(0) rotateY(0)`;
                
                grid.appendChild(card);
            });
        }

        // --- CURSOR Y FONDO ---
        const cursor = document.getElementById("custom-cursor");
        document.addEventListener("mousemove", (e) => {
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
        });

        // --- RELOJ Y FECHA ---
        setInterval(() => {
            const now = new Date();
            document.getElementById("date-display").innerText = now.toLocaleString('es-ES', { weekday: 'long', hour: '2-digit', minute: '2-digit' }).toUpperCase();
        }, 1000);

        // --- BÚSQUEDA ---
        document.getElementById("gameSearch").oninput = (e) => render(e.target.value);

        // --- MODO PÁNICO (Tecla 'P') ---
        document.addEventListener("keydown", (e) => {
            if(e.key.toLowerCase() === 'p') {
                window.location.href = "https://classroom.google.com";
            }
        });

        render();
    </script>
</body>
</html>
