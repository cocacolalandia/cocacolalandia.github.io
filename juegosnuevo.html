<!DOCTYPE html>
<html lang="es">

<head>
    <script src="/global-head.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocacolalandia - Juegos Unblocked</title>

    <!-- FUENTES DEL INDEX -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">

    <style>
        /* ESTILO INDEX APLICADO AL ORIGINAL[cite: 2] */
        :root {
            --primary: #ff003c;
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --font: 'Space Grotesk', sans-serif;
            /* Re-mapeo de variables originales[cite: 2] */
            --bg-color: #0a0a0a;
            --card-color: rgba(255, 255, 255, 0.03);
            --text-color: #ffffff;
            --accent: #ff003c;
            --accent2: #bc13fe;
            --shadow: 0 0 15px rgba(255, 0, 60, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font) !important; }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ESTRUCTURA DE BARRA LATERAL */
        .app-container {
            display: grid;
            grid-template-columns: 100px 1fr;
            height: 100vh;
        }

        nav {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 25px;
            z-index: 1000;
        }

        .brand-logo-nav { width: 65px; cursor: pointer; margin-bottom: 20px; }

        .nav-link {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.4s;
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 16px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary);
            background: rgba(255, 0, 60, 0.1);
        }

        main {
            overflow-y: auto;
            padding: 40px;
        }

        /* ESTILOS DE JUEGOS COPIADOS DEL ORIGINAL[cite: 2] */
        #searchBox {
            width: 100%; max-width: 600px; background: var(--surface);
            border: 1px solid var(--border); padding: 15px; color: white;
            border-radius: 15px; margin: 20px auto; display: block; outline: none;
        }

        #sections-container input[type="button"] {
            display: block; width: 100%; max-width: 600px;
            margin: 8px auto; background: var(--card-color);
            color: var(--text-color); border: 1px solid var(--border);
            padding: 18px 22px; border-radius: 16px; cursor: pointer;
            font-size: 1.1rem; font-weight: 600; text-align: left;
            transition: 0.3s;
        }

        #sections-container input[type="button"]:hover {
            background: var(--accent); border-color: var(--accent);
        }

        .game-wrapper { position: relative; max-width: 600px; margin: 8px auto; }
        .favorite-star {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            font-size: 18px; cursor: pointer; color: #aaa;
        }
        .favorite-star.active { color: gold; }

        iframe {
            width: 100%; height: 80vh; border: none; border-radius: 20px;
            margin-top: 20px; background: #000;
        }

        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }

        .back-btn {
            background: var(--accent2); color: white; border: none;
            padding: 12px 20px; border-radius: 12px; cursor: pointer; margin: 5px;
        }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            nav { flex-direction: row; width: 100%; height: 70px; position: fixed; bottom: 0; padding: 0; justify-content: space-around; border-right: none; border-top: 1px solid var(--border); }
            main { padding: 20px 20px 100px; }
        }
    </style>
</head>

<body>
    <!-- BLOQUEO ORIGINAL[cite: 2] -->
    <script>
    if (window.self !== window.top || !window.location.href.includes("cocacolalandia.github.io")) {
        window.stop();
        document.documentElement.innerHTML = '<body style="background:#000;color:red;display:flex;justify-content:center;align-items:center;height:100vh;"><h1>ACCESO NO AUTORIZADO</h1></body>';
    }
    </script>

    <div id="loader"><div class="loader-circle" style="border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div></div>

    <div class="app-container">
        <!-- NAV DEL INDEX -->
        <nav>
            <img src="https://i.imgur.com/PPO7d2j.png" class="brand-logo-nav" onclick="location.href='/'">
            <div class="nav-link" onclick="location.href='/'"><i class="bi bi-house-door"></i></div>
            <div class="nav-link active"><i class="bi bi-controller"></i></div>
            <div class="nav-link" onclick="window.open('https://classroom.google.com')"><i class="bi bi-radioactive"></i></div>
        </nav>

        <main>
            <h1 style="text-align:center">Juegos de Cocacolalandia</h1>
            <h2 id="gameTitle" style="text-align:center; margin-top:20px; display:none;"></h2>

            <div id="launcher">
                <div id="menuUI">
                    <!-- BUSCADOR ORIGINAL[cite: 2] -->
                    <input type="text" id="searchBox" placeholder="Buscar juegos...">

                    <div id="anuncios">
                        <div id="sections-container"></div>
                        <!-- SCRIPT DE CARGA ORIGINAL[cite: 2] -->
                        <script>
                            (function() {
                                const s = document.createElement("script");
                                s.src = "https://cdn.jsdelivr.net/gh/bubbles/ugs-singlefile@main/games.js";
                                document.body.appendChild(s);
                            })();
                        </script>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS LÓGICOS ORIGINALES (SIN TOCAR NI UNA COMA)[cite: 2] -->
    <script>
        // IA Limpieza (Original)[cite: 2]
        (function() {
            function cleanText(txt) {
                if (!txt || typeof txt !== 'string') return txt;
                let s = txt.replace(/^(cl|gh|v)\-?/gi, '').replace(/[\-_.]/g, ' ');
                s = s.replace(/([a-zA-Z])(\d)/g, '$1 $2').replace(/(\d)([a-zA-Z])/g, '$1 $2').replace(/([a-z])([A-Z])/g, '$1 $2');
                return s.trim().toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
            }
            const originalSetAttribute = HTMLInputElement.prototype.setAttribute;
            HTMLInputElement.prototype.setAttribute = function(name, value) {
                if (name === 'value' && this.type === 'button') return originalSetAttribute.call(this, name, cleanText(value));
                return originalSetAttribute.call(this, name, value);
            };
        })();

        // Funciones de UI Originales[cite: 2]
        setTimeout(() => document.getElementById("loader").style.display = "none", 1000);

        document.getElementById("searchBox").oninput = e => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll(".game-wrapper").forEach(wrapper => {
                const btn = wrapper.querySelector("input");
                if (btn) wrapper.style.display = btn.value.toLowerCase().includes(term) ? "block" : "none";
            });
        };

        const launcher = document.getElementById("launcher");
        const menuUI = document.getElementById("menuUI");

        launcher.addEventListener("click", e => {
            const targetBtn = e.target.closest("input[type='button']");
            if (targetBtn && !e.target.classList.contains('favorite-star')) {
                const src = targetBtn.getAttribute('onclick').match(/'([^']+)'/)[1];
                document.getElementById("gameTitle").textContent = targetBtn.value;
                document.getElementById("gameTitle").style.display = "block";
                menuUI.style.display = "none";
                launcher.innerHTML = `
                    <button class="back-btn" onclick="location.reload()">VOLVER</button>
                    <button class="back-btn" id="fsBtn">PANTALLA COMPLETA</button>
                    <iframe id="gameFrame" src="${src}" allowfullscreen></iframe>`;
                document.getElementById("fsBtn").onclick = () => document.getElementById("gameFrame").requestFullscreen();
            }
        });

        // Favoritos Originales[cite: 2]
        const favKey = "cocacolalandia_favorites";
        function getFavs() { return JSON.parse(localStorage.getItem(favKey) || "[]"); }
        function toggleFav(name) {
            let f = getFavs();
            f = f.includes(name) ? f.filter(x => x !== name) : [...f, name];
            localStorage.setItem(favKey, JSON.stringify(f));
            refreshStars(); reorderGames();
        }
        function refreshStars() {
            const favs = getFavs();
            document.querySelectorAll(".favorite-star").forEach(star => {
                const active = favs.includes(star.dataset.name);
                star.className = `favorite-star fa-${active ? 'solid' : 'regular'} fa-star ${active ? 'active' : ''}`;
            });
        }
        function reorderGames() {
            const favs = getFavs();
            const container = document.getElementById("sections-container");
            if (!container) return;
            const wrappers = [...container.querySelectorAll(".game-wrapper")];
            wrappers.sort((a, b) => (favs.includes(b.dataset.name) ? 1 : 0) - (favs.includes(a.dataset.name) ? 1 : 0));
            wrappers.forEach(w => container.appendChild(w));
        }
        function initFavorites() {
            document.querySelectorAll("#sections-container input[type='button']").forEach(btn => {
                if (btn.dataset.favdone) return;
                const wrapper = document.createElement("div"); wrapper.className = "game-wrapper";
                btn.parentNode.insertBefore(wrapper, btn); wrapper.appendChild(btn);
                wrapper.dataset.name = btn.value;
                const star = document.createElement("i");
                star.className = "favorite-star fa-regular fa-star";
                star.dataset.name = btn.value;
                star.onclick = (e) => { e.stopPropagation(); toggleFav(btn.value); };
                wrapper.appendChild(star); btn.dataset.favdone = true;
            });
            refreshStars(); reorderGames();
        }
        setTimeout(initFavorites, 3000);
        
        // Seguridad Original[cite: 2]
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode))) return false; };
    </script>

    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
