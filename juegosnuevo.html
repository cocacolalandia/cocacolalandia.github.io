<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocacolalandia - Juegos</title>

    <!-- Tipografía del index -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">

    <style>
        /* ============================
   ESTILOS ROJOS DEL INDEX
   ============================ */

        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #ff2b2b;
            --accent2: #ff4747;
            --shadow: 0 0 15px rgba(255, 0, 0, 0.25);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Space Grotesk", sans-serif;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 85px;
            height: 100vh;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            gap: 25px;
            border-right: 2px solid #222;
        }

        .sidebar a {
            color: var(--text);
            font-size: 26px;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover {
            color: var(--accent);
            transform: scale(1.15);
        }

        /* CONTENIDO PRINCIPAL */
        .main {
            margin-left: 110px;
            padding: 30px;
        }

        /* BUSCADOR */
        #searchBox {
            width: 100%;
            max-width: 600px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        /* CONTENEDOR DE JUEGOS */
        #anuncios {
            margin-top: 20px;
        }

        /* Botones generados por tu script externo */
        #sections-container input[type="button"] {
            display: block;
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
            padding: 18px 22px;
            background: var(--card);
            color: var(--text);
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }

        #sections-container input[type="button"]:hover {
            background: var(--accent);
            color: #000;
        }

        /* FAVORITOS */
        .game-wrapper {
            position: relative;
            max-width: 600px;
            margin: 10px auto;
        }

        .favorite-star {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            cursor: pointer;
            color: #888;
        }

        .favorite-star.active {
            color: gold;
        }

        /* IFRAME DEL JUEGO */
        iframe {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            border: none;
            border-radius: 12px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- ============================
     SCRIPT DE BLOQUEO ORIGINAL
     ============================ -->
    <script>
        (function() {
            const urlOficial = "https://cocacolalandia.github.io/juegos";

            if (window.self !== window.top || !window.location.href.includes("cocacolalandia.github.io")) {
                window.stop();
                document.documentElement.innerHTML = `
    <body style="margin:0; background:#000; color:red; display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial;">
      <h1 style="font-size:8vw; text-align:center; margin:0; font-weight:900;">
        ESTE NO ES EL LINK CORRECTO
      </h1>
    </body>`;
            }
        })();
    </script>

    <!-- ============================
     SIDEBAR DEL INDEX
     ============================ -->
    <div class="sidebar">
        <a href="/"><i class="fa-solid fa-house"></i></a>
        <a href="/juegos"><i class="fa-solid fa-gamepad"></i></a>
        <a href="/chat"><i class="fa-solid fa-comments"></i></a>
        <a href="https://classroom.google.com"><i class="fa-solid fa-life-ring"></i></a>
    </div>

    <!-- ============================
     CONTENIDO PRINCIPAL
     ============================ -->
    <div class="main">
        <h1>Juegos de Cocacolalandia</h1>
        <p>Compatible con Chromebooks.</p>

        <input type="text" id="searchBox" placeholder="Buscar juegos...">

        <h2 id="gameTitle" style="display:none; margin-top:20px;"></h2>

        <div id="launcher">
            <div id="menuUI">
                <div id="anuncios">
                    <div id="sections-container"></div>
                    <!-- Script externo que carga tu catálogo de juegos -->
                    <script>
                        (function() {
                            const url = "https://cdn.jsdelivr.net/gh/bubbls/ugs-single-file@main/games.js";
                            const s = document.createElement("script");
                            s.src = url;
                            document.body.appendChild(s);
                        })();
                    </script>

                </div> <!-- cierre de #anuncios -->
            </div> <!-- cierre de #menuUI -->
        </div> <!-- cierre de #launcher -->
    </div> <!-- cierre de .main -->

    <!-- ============================
     SISTEMA DE FAVORITOS ORIGINAL
     ============================ -->
    <script>
        // IA de limpieza de nombres de juegos
        function cleanText(txt) {
            if (!txt || typeof txt !== "string") return txt;

            // Quitar prefijos cl / gh / v al inicio, pero dejar números
            let s = txt.replace(/^(cl|gh|v)-?/gi, "");

            // Reemplazar guiones, puntos y guiones bajos por espacios
            s = s.replace(/[-_.]/g, " ");

            // Separar letras y números: 13dash -> 13 Dash, mario64 -> Mario 64
            s = s.replace(/([a-zA-Z])(\d)/g, "$1 $2");
            s = s.replace(/(\d)([a-zA-Z])/g, "$1 $2");

            // Separar camelCase: SuperMario -> Super Mario
            s = s.replace(/([a-z])([A-Z])/g, "$1 $2");

            // Capitalizar cada palabra
            return s
                .trim()
                .toLowerCase()
                .replace(/\b\w/g, l => l.toUpperCase());
        }

        // Secuestro de prototipo para limpiar automáticamente los botones
        (function() {
            const originalSetAttribute = HTMLInputElement.prototype.setAttribute;
            HTMLInputElement.prototype.setAttribute = function(name, value) {
                if (name === "value" && this.type === "button") {
                    const cleaned = cleanText(value);
                    return originalSetAttribute.call(this, name, cleaned);
                }
                return originalSetAttribute.call(this, name, value);
            };

            const descriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, "value");
            Object.defineProperty(HTMLInputElement.prototype, "value", {
                set: function(v) {
                    const cleaned = this.type === "button" ? cleanText(v) : v;
                    descriptor.set.call(this, cleaned);
                },
                get: function() {
                    return descriptor.get.call(this);
                },
                configurable: true
            });
        })();
    </script>

    <script>
        const favKey = "cocacolalandia_favorites";

        function getFavs() {
            return JSON.parse(localStorage.getItem(favKey) || "[]");
        }

        function saveFavs(f) {
            localStorage.setItem(favKey, JSON.stringify(f));
        }

        function toggleFav(name) {
            let f = getFavs();
            if (f.includes(name)) {
                f = f.filter(x => x !== name);
            } else {
                f.push(name);
            }
            saveFavs(f);
            refreshStars();
            reorderGames();
        }

        function refreshStars() {
            const favs = getFavs();
            document.querySelectorAll(".favorite-star").forEach(star => {
                if (favs.includes(star.dataset.name)) {
                    star.classList.add("active");
                    star.classList.remove("fa-regular");
                    star.classList.add("fa-solid");
                } else {
                    star.classList.remove("active");
                    star.classList.remove("fa-solid");
                    star.classList.add("fa-regular");
                }
            });
        }

        function reorderGames() {
            const favs = getFavs();
            const container = document.getElementById("sections-container");
            if (!container) return;

            const wrappers = [...container.querySelectorAll(".game-wrapper")];

            wrappers.sort((a, b) => {
                const aFav = favs.includes(a.dataset.name);
                const bFav = favs.includes(b.dataset.name);
                if (aFav && !bFav) return -1;
                if (!aFav && bFav) return 1;
                return 0;
            });

            wrappers.forEach(w => container.appendChild(w));
        }

        function initFavorites() {
            document.querySelectorAll("#sections-container input[type='button']").forEach(btn => {
                if (btn.dataset.favdone) return;

                const wrapper = document.createElement("div");
                wrapper.className = "game-wrapper";

                btn.parentNode.insertBefore(wrapper, btn);
                wrapper.appendChild(btn);

                const name = btn.value;
                wrapper.dataset.name = name;

                const star = document.createElement("i");
                star.className = "favorite-star fa-regular fa-star";
                star.dataset.name = name;

                star.onclick = (e) => {
                    e.stopPropagation();
                    toggleFav(name);
                };

                wrapper.appendChild(star);
                btn.dataset.favdone = true;
            });

            refreshStars();
            reorderGames();
        }

        setTimeout(initFavorites, 3000);
    </script>

    <!-- ============================
     BUSCADOR ORIGINAL
     ============================ -->
    <script>
        document.getElementById("searchBox").oninput = e => {
            const term = e.target.value.toLowerCase();

            document.querySelectorAll(".game-wrapper").forEach(wrapper => {
                const btn = wrapper.querySelector("input, .game-btn");
                if (btn) {
                    const text = (btn.value || btn.textContent).toLowerCase();
                    wrapper.style.display = text.includes(term) ? "block" : "none";
                }
            });
        };
    </script>

    <!-- ============================
     SISTEMA DE JUEGO EN IFRAME
     ============================ -->
    <script>
        const launcher = document.getElementById("launcher");
        const menuUI = document.getElementById("menuUI");
        const anuncios = document.getElementById("anuncios");

        launcher.addEventListener("click", e => {
            const targetBtn = e.target.closest(".game-btn, input[type='button']");
            if (!targetBtn) return;

            const src = targetBtn.dataset.src;
            if (!src) return;

            document.getElementById("gameTitle").textContent = targetBtn.textContent.trim();
            document.getElementById("gameTitle").style.display = "block";

            menuUI.style.display = "none";
            anuncios.style.display = "none";

            launcher.innerHTML = `
        <button class="back-btn" id="backBtn">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </button>
        <button class="back-btn" id="fullscreenBtn">
            <i class="fa-solid fa-expand"></i> Pantalla completa
        </button>
        <iframe id="gameFrame" src="${src}" allowfullscreen></iframe>
    `;

            document.getElementById("backBtn").onclick = () => {
                launcher.innerHTML = "";
                document.getElementById("gameTitle").style.display = "none";
                menuUI.style.display = "block";
                anuncios.style.display = "block";
                launcher.appendChild(menuUI);
                launcher.appendChild(anuncios);
            };

            document.getElementById("fullscreenBtn").onclick = () => {
                const iframe = document.getElementById("gameFrame");
                if (iframe.requestFullscreen) iframe.requestFullscreen();
                else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
                else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
            };
        });
    </script>

    <!-- ============================
     ANTI-INSPECCIÓN ORIGINAL
     ============================ -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };
    </script>
    <script>
        // --- FUNCIÓN INDEPENDIENTE DE BÚSQUEDA POR URL ---
        function realizarBusquedaPorURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('search');
            if (query) {
                const searchBox = document.getElementById("searchBox");
                if (searchBox) {
                    searchBox.value = query;
                    // Forzamos el evento 'input' para que el buscador reaccione
                    searchBox.dispatchEvent(new Event('input'));
                }

                const term = query.toLowerCase();
                // Buscamos en los wrappers creados por tu sistema de favoritos
                document.querySelectorAll(".game-wrapper").forEach(wrapper => {
                    const btn = wrapper.querySelector("input, .game-btn");
                    if (btn) {
                        const text = (btn.value || btn.textContent).toLowerCase();
                        wrapper.style.display = text.includes(term) ? "block" : "none";
                    }
                });
            }
        }

        // Se ejecuta un poco después de los favoritos (3000ms) para no chocar
        setTimeout(realizarBusquedaPorURL, 3500);
    </script>

</body>

</html>
